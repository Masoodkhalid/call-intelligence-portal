<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Call Intelligence Portal</title>
<style>
  :root{
    --bg:#0e1117; --panel:#171c26; --panel2:#1f2632; --line:#2b3442;
    --text:#e6edf3; --muted:#8b97a8; --accent:#4f9cf9; --good:#3fb950;
    --bad:#f85149; --warn:#d29922; --bot:#1f6feb; --cust:#8957e5;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;
         background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .pill{font-size:12px;color:var(--muted)}
  nav{display:flex;gap:6px;padding:10px 18px;background:var(--panel);
      border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  nav button{background:transparent;border:1px solid transparent;color:var(--muted);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
  nav button.active{background:var(--panel2);color:var(--text);border-color:var(--line)}
  main{padding:22px;max-width:1180px;margin:0 auto}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi{font-size:28px;font-weight:700}
  .kpi.good{color:var(--good)} .kpi.accent{color:var(--accent)}
  .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  h2{font-size:15px;margin:26px 0 12px;font-weight:600}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--muted);font-weight:600}
  .bar{height:9px;border-radius:5px;background:var(--panel2);overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--accent)}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;
       background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .tag.win{color:var(--good);border-color:var(--good)}
  select,input{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .callrow{cursor:pointer} .callrow:hover{background:var(--panel2)}
  .funnel-step{margin:6px 0}
  .funnel-step .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .turn{margin:6px 0;display:flex;gap:8px}
  .turn .who{font-size:11px;font-weight:700;min-width:74px;padding-top:2px}
  .turn.BOT .who{color:var(--bot)} .turn.CUSTOMER .who{color:var(--cust)}
  .turn .txt{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:7px 10px;flex:1}
  .turn.BOT .txt{border-left:3px solid var(--bot)}
  .turn.CUSTOMER .txt{border-left:3px solid var(--cust)}
  pre{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:14px;font:13px/1.6 ui-monospace,Menlo,monospace}
  .muted{color:var(--muted)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    align-items:center;justify-content:center;z-index:20}
  .modal.open{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:min(760px,92vw);max-height:86vh;overflow:auto;padding:20px}
  .x{float:right;cursor:pointer;color:var(--muted);font-size:20px}
  audio{width:100%;margin:10px 0}
  .chip{padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);
    font-size:12px;margin:2px;display:inline-block}
</style>
</head>
<body>
<header>
  <h1>📞 Call Intelligence Portal</h1>
  <span class="pill" id="hdr-stat">loading…</span>
  <button id="sync-btn" onclick="startSync()"
    style="margin-left:auto;background:#238636;border:none;color:#fff;
           padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">
    🔄 Sync Sheet
  </button>
</header>

<!-- Sync progress panel -->
<div id="sync-panel" style="display:none;background:#161b22;border-bottom:2px solid #238636;
     padding:12px 22px;font-family:ui-monospace,Menlo,monospace;font-size:12px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <b style="color:#3fb950" id="sync-title">Syncing…</b>
    <span id="sync-close" onclick="$('#sync-panel').style.display='none'"
      style="cursor:pointer;color:#8b97a8;font-size:16px">✕</span>
  </div>
  <div id="sync-log" style="max-height:120px;overflow-y:auto;color:#e6edf3;line-height:1.7"></div>
</div>
<nav>
  <button data-tab="dashboard" class="active">Dashboard</button>
  <button data-tab="transcripts">Transcripts</button>
  <button data-tab="detected">Scripts Detected</button>
  <button data-tab="flows">Flow Maps</button>
  <button data-tab="scripts">Recovery Scripts</button>
  <button data-tab="generator">✨ Script Generator</button>
</nav>
<main>
  <section id="dashboard"></section>
  <section id="transcripts" hidden></section>
  <section id="detected" hidden></section>
  <section id="flows" hidden></section>
  <section id="scripts" hidden></section>
  <section id="generator" hidden></section>
</main>

<div class="modal" id="modal"><div class="box">
  <span class="x" onclick="closeModal()">✕</span>
  <div id="modal-body"></div>
</div></div>

<script>
const $ = s => document.querySelector(s);
const api = p => fetch(p).then(r=>r.json());
let SUMMARY=null, FLOWS=null;

document.querySelectorAll('nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    ['dashboard','transcripts','detected','flows','scripts','generator']
      .forEach(t=>$('#'+t).hidden=(t!==b.dataset.tab));
    if(b.dataset.tab==='transcripts') loadTranscripts();
    if(b.dataset.tab==='detected') renderDetected();
    if(b.dataset.tab==='flows') renderFlows();
    if(b.dataset.tab==='scripts') renderScripts();
    if(b.dataset.tab==='generator') renderGenerator();
  };
});

function pct(n){return (n||0).toFixed(1)+'%';}

async function boot(){
  SUMMARY = await api('/api/summary');
  FLOWS = await api('/api/flows');
  $('#hdr-stat').textContent =
    `${SUMMARY.total_calls||0} calls · ${SUMMARY.transfers||0} transfers · ${pct(SUMMARY.transfer_rate)} transfer rate`;
  renderDashboard();
}

function renderDashboard(){
  const s=SUMMARY;
  const dc=s.dispo_counts||{}, dl=s.dispo_labels||{};
  const sorted=Object.entries(dc).sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...sorted.map(x=>x[1]));
  // Use companies (mcc3, mcc5, Halink, aicontact, …)
  let comps='';
  for(const [c,st] of Object.entries(s.companies||{})){
    const camps=(st.campaigns||[]).join(', ')||'—';
    const bots=(st.bot_companies||[]).join(', ')||'—';
    comps+=`<tr><td><b>${c}</b></td><td class="muted">${bots}</td><td class="muted">${camps}</td><td>${st.count}</td><td>${st.wins}</td>
      <td><span class="tag win">${pct(st.transfer_rate)}</span></td></tr>`;
  }
  let rows='';
  for(const [d,n] of sorted){
    const isWin=FLOWS[d]&&FLOWS[d].is_win;
    rows+=`<tr><td><span class="tag ${isWin?'win':''}">${d}</span> ${dl[d]||''}</td>
      <td>${n}</td><td style="width:45%"><div class="bar"><i style="width:${100*n/max}%;background:${isWin?'var(--good)':'var(--accent)'}"></i></div></td></tr>`;
  }
  $('#dashboard').innerHTML=`
    <div class="grid cards">
      <div class="card"><div class="label">Total Calls</div><div class="kpi">${s.total_calls||0}</div></div>
      <div class="card"><div class="label">Transfers (wins)</div><div class="kpi good">${s.transfers||0}</div></div>
      <div class="card"><div class="label">Transfer Rate</div><div class="kpi accent">${pct(s.transfer_rate)}</div></div>
      <div class="card"><div class="label">Avg Duration</div><div class="kpi">${s.avg_duration||0}s</div></div>
    </div>
    <h2>Dispositions</h2>
    <div class="card"><table><thead><tr><th>Disposition</th><th>Calls</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <h2>By Company</h2>
    <div class="card"><table><thead><tr><th>Company</th><th>Bot</th><th>Campaign</th><th>Calls</th><th>Transfers</th><th>Rate</th></tr></thead><tbody>${comps}</tbody></table></div>`;
}

// ---- Transcripts -----------------------------------------------------------
const TX_PAGE_SIZE = 100;
let TX_ALL = [];    // full filtered result from API
let TX_PAGE = 0;    // current page index (0-based)

function dispoOptions(){
  return Object.keys(SUMMARY.dispo_labels||{}).sort()
    .map(d=>`<option value="${d}">${d} — ${SUMMARY.dispo_labels[d]}</option>`).join('');
}
function companyOptions(){
  return (SUMMARY.all_companies||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}
function campaignOptions(){
  return (SUMMARY.all_campaigns||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}
function botOptions(){
  return (SUMMARY.all_bot_companies||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

async function loadTranscripts(resetPage){
  if(resetPage || resetPage===undefined) TX_PAGE=0;
  if(!$('#tx-controls')){
    $('#transcripts').innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:10px" id="tx-controls">
        <select id="f-company"><option value="">All Companies</option>${companyOptions()}</select>
        <select id="f-bot"><option value="">All Bot Companies</option>${botOptions()}</select>
        <select id="f-campaign"><option value="">All Campaigns</option>${campaignOptions()}</select>
        <select id="f-dispo"><option value="">All Dispositions</option>${dispoOptions()}</select>
        <input id="f-phone" placeholder="Phone number…">
        <button onclick="loadTranscripts(true)" style="background:var(--accent);border:none;color:#fff;
          padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">Search</button>
      </div>
      <div id="tx-list">loading…</div>`;
    ['f-company','f-bot','f-campaign','f-dispo'].forEach(id=>{
      $(('#'+id)).addEventListener('change',()=>loadTranscripts(true));
    });
    $('#f-phone').addEventListener('keydown',e=>{if(e.key==='Enter')loadTranscripts(true);});
  }
  const company    = $('#f-company').value;
  const bot        = $('#f-bot').value;
  const campaign   = $('#f-campaign').value;
  const dispo      = $('#f-dispo').value;
  const phone      = $('#f-phone').value.trim();
  const url = `/api/calls?company=${encodeURIComponent(company)}&bot_company=${encodeURIComponent(bot)}&campaign=${encodeURIComponent(campaign)}&dispo=${encodeURIComponent(dispo)}&phone=${encodeURIComponent(phone)}`;
  const d = await api(url);
  TX_ALL = d.calls;
  renderTxPage();
}

function renderTxPage(){
  const total = TX_ALL.length;
  const pages = Math.max(1, Math.ceil(total / TX_PAGE_SIZE));
  TX_PAGE = Math.min(TX_PAGE, pages-1);
  const slice = TX_ALL.slice(TX_PAGE*TX_PAGE_SIZE, (TX_PAGE+1)*TX_PAGE_SIZE);

  let rows = slice.map(c=>`<tr class="callrow" onclick="openCall('${c.id}')">
    <td>${c.phone||'—'}</td>
    <td><b>${c.company}</b></td>
    <td><span style="color:var(--accent);font-size:12px">${c.bot_company||'—'}</span></td>
    <td>${c.campaign_name}</td>
    <td><span class="tag ${FLOWS[c.dispo]&&FLOWS[c.dispo].is_win?'win':''}">${c.dispo}</span></td>
    <td class="muted">${c.date}</td>
    <td>${c.duration}s</td>
    <td class="muted" style="max-width:240px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${(c.preview||'').replace(/</g,'&lt;')}…</td>
  </tr>`).join('');

  // pagination bar
  let pager = '';
  if(pages>1){
    pager = `<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">
      <span class="muted">Page ${TX_PAGE+1} of ${pages} (${total} calls)</span>
      <button onclick="txGo(0)" ${TX_PAGE===0?'disabled':''} class="chip">« First</button>
      <button onclick="txGo(${TX_PAGE-1})" ${TX_PAGE===0?'disabled':''} class="chip">‹ Prev</button>`;
    const start=Math.max(0,TX_PAGE-2), end=Math.min(pages,TX_PAGE+3);
    for(let i=start;i<end;i++){
      pager+=`<button onclick="txGo(${i})" class="chip" ${i===TX_PAGE?'style="background:var(--accent);color:#fff;border-color:var(--accent)"':''}>${i+1}</button>`;
    }
    pager+=`<button onclick="txGo(${TX_PAGE+1})" ${TX_PAGE>=pages-1?'disabled':''} class="chip">Next ›</button>
      <button onclick="txGo(${pages-1})" ${TX_PAGE>=pages-1?'disabled':''} class="chip">Last »</button>
    </div>`;
  } else {
    pager=`<div class="muted" style="margin-top:8px">${total} calls</div>`;
  }

  $('#tx-list').innerHTML=`
    <div class="card" style="overflow-x:auto">
      <table><thead><tr>
        <th>Phone</th><th>Company</th><th>Bot Company</th><th>Campaign</th>
        <th>Disposition</th><th>Date</th><th>Duration</th><th>Preview</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan=8 class=muted style="padding:20px">No matches</td></tr>'}</tbody></table>
    </div>
    ${pager}`;
}

function txGo(page){
  TX_PAGE=page;
  renderTxPage();
  $('#transcripts').scrollIntoView({behavior:'smooth',block:'start'});
}

async function openCall(cid){
  const t=await api('/api/call/'+cid);
  let turns=(t.turns||[]).map(x=>`<div class="turn ${x.speaker}">
    <div class="who">${x.speaker==='BOT'?'🤖 BOT':'🧑 CUST'}</div>
    <div class="txt">${x.text}</div></div>`).join('') ||
    `<pre>${t.text||'(no speech detected)'}</pre>`;
  const company   = t.company    || t.campaign;
  const campName  = t.campaign_name || 'Medicare';
  const botComp   = t.bot_company  || '—';
  $('#modal-body').innerHTML=`
    <h2 style="margin-top:0">${company}
      <span class="muted" style="font-weight:400;font-size:13px"> · ${botComp} · ${campName} · </span>
      <span class="tag ${t.dispo==='RAXFER'?'win':''}">${t.dispo}</span> ${t.dispo_label}
    </h2>
    <div class="muted">${t.date} ${t.time} · ${t.phone} · ${t.duration}s</div>
    <audio controls src="/api/audio/${cid}"></audio>
    <div>${turns}</div>`;
  $('#modal').classList.add('open');
}
function closeModal(){$('#modal').classList.remove('open');}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

// ---- Scripts Detected ------------------------------------------------------
const ROLE_COLORS = {
  IDENTIFY:   {bg:'#1f3a5f', border:'#4f9cf9', label:'🤖 IDENTIFY'},
  PITCH:      {bg:'#2a1f5f', border:'#8957e5', label:'📣 PITCH'},
  QUALIFY:    {bg:'#1f4a2a', border:'#3fb950', label:'✅ QUALIFY (Part A & B)'},
  TRANSFER:   {bg:'#1f3a30', border:'#39d353', label:'🔄 TRANSFER'},
  DISQUALIFY: {bg:'#4a1f1f', border:'#f85149', label:'❌ DISQUALIFY'},
};
const ROLE_ORDER = ['IDENTIFY','PITCH','QUALIFY','TRANSFER','DISQUALIFY'];

function buildScriptHTML(full_script){
  if(!full_script||!full_script.length) return '<span class="muted">No script lines recovered</span>';
  // group by role in canonical order
  const byRole={};
  for(const ln of full_script){
    if(!byRole[ln.role]) byRole[ln.role]=[];
    byRole[ln.role].push(ln);
  }
  let html='';
  for(const role of ROLE_ORDER){
    if(!byRole[role]) continue;
    const {bg,border,label}=ROLE_COLORS[role]||{bg:'#1e2430',border:'#4f9cf9',label:role};
    html+=`<div style="margin:10px 0;background:${bg};border-left:4px solid ${border};
      border-radius:0 8px 8px 0;padding:10px 14px">
      <div style="font-size:11px;font-weight:700;color:${border};letter-spacing:.06em;
        margin-bottom:6px">${label}</div>`;
    for(const ln of byRole[role]){
      html+=`<div style="margin:5px 0;display:flex;gap:10px;align-items:flex-start">
        <span style="font-size:11px;color:#8b97a8;min-width:44px;padding-top:2px">${ln.pct}%</span>
        <span style="font-size:13px;line-height:1.5">"${ln.line}"</span></div>`;
    }
    html+='</div>';
  }
  return html;
}

async function renderDetected(){
  $('#detected').innerHTML='<div class="card">analysing…</div>';
  const d=await api('/api/scripts_detected');
  const s=d.scripts||[];
  let html=`<div class="grid cards" style="margin-bottom:16px">
    <div class="card"><div class="label">Distinct Scripts Detected</div>
      <div class="kpi accent">${d.count||0}</div></div></div>
    <p class="muted" style="margin:0 0 14px">Agent name, state, year and $ are treated as variables.
    Percentage = share of that script's calls where the line appeared. Only pitch-relevant lines shown.</p>`;
  for(const sc of s){
    if(sc.calls<2) continue;
    const names=(sc.agent_names||[]).map(x=>`<span class="chip">${x[0]} ×${x[1]}</span>`).join('')||'<span class=muted>—</span>';
    const states=(sc.states||[]).slice(0,10).map(x=>`<span class="chip">${x[0]} ×${x[1]}</span>`).join('')||'<span class=muted>—</span>';
    const dispos=(sc.dispo_breakdown||[]).map(([d,n])=>{
      const win=d==='RAXFER';
      return `<span class="chip${win?' win':''}">${d}: ${n}</span>`;
    }).join('');
    html+=`<div class="card" style="margin-bottom:18px">
      <div class="row" style="margin:0 0 10px;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">Script ${sc.id}</h2>
        <span class="chip">${sc.calls} calls</span>
        <span class="chip">${sc.variants} wording variants</span>
        <span class="tag ${sc.transfer_rate>0?'win':''}">${sc.transfer_rate}% transferred</span>
      </div>
      ${buildScriptHTML(sc.full_script)}
      <div style="margin-top:12px">
        <div class="label">Agent names used</div><div style="margin-bottom:6px">${names}</div>
        <div class="label">States / regions</div><div style="margin-bottom:6px">${states}</div>
        <div class="label">Outcome breakdown</div><div>${dispos}</div>
      </div>
    </div>`;
  }
  $('#detected').innerHTML=html;
}

// ---- Flow maps -------------------------------------------------------------
async function renderFlows(){
  const fd=await api('/api/flows_detected');
  let top=`<div class="grid cards"><div class="card"><div class="label">Distinct Flow Paths</div>
    <div class="kpi accent">${fd.count||0}</div></div></div>
    <h2>Distinct flows (path through the funnel)</h2>`;
  for(const f of (fd.flows||[])){
    if(f.calls<3) continue;
    const dispos=(f.dispo_breakdown||[]).map(x=>`<span class="chip">${x[0]}:${x[1]}</span>`).join('');
    top+=`<div class="card" style="margin-bottom:10px">
      <div class="row" style="margin:0 0 6px"><b>${f.signature}</b>
        <span class="chip">${f.calls} calls · ${f.pct}%</span>
        <span class="tag ${f.transfer_rate>0?'win':''}">${f.transfer_rate}% transferred</span></div>
      <div>${dispos}</div></div>`;
  }
  $('#flows').innerHTML=top+'<h2>Funnel by disposition</h2>'+flowFunnelsHTML();
}
function flowFunnelsHTML(){
  const order=Object.values(FLOWS).sort((a,b)=>b.count-a.count);
  let html='';
  for(const f of order){
    let steps=f.funnel.map(s=>`<div class="funnel-step">
      <div class="top"><span>${s.label}</span><span class="muted">${s.count} · ${s.pct}%</span></div>
      <div class="bar"><i style="width:${s.pct}%"></i></div></div>`).join('');
    let obj=(f.top_objections||[]).map(o=>`<span class="chip">"${o[0]}" ×${o[1]}</span>`).join('')||'<span class="muted">none</span>';
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="row" style="margin:0 0 10px"><h2 style="margin:0">${f.label}
        <span class="tag ${f.is_win?'win':''}">${f.dispo}</span></h2>
        <span class="muted">${f.count} calls · avg ${f.avg_duration}s</span></div>
      ${steps}
      <div style="margin-top:10px"><div class="label">Top objections / customer pushback</div>${obj}</div>
    </div>`;
  }
  return html;
}

// ---- Script Studio ---------------------------------------------------------
async function renderScripts(){
  $('#scripts').innerHTML='<div class="card">loading scripts…</div>';
  const d=await api('/api/scripts');
  const scripts=d.scripts||{};
  if(!Object.keys(scripts).length){
    $('#scripts').innerHTML='<div class="card muted">No scripts yet. Run the Script Agent (pipeline/script_agent.py).</div>';
    return;
  }
  let html=`<div class="muted" style="margin-bottom:10px">Generated ${d.index.generated_at||''} · engine improves these per disposition.</div>`;
  for(const [dispo,s] of Object.entries(scripts)){
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="row" style="margin:0 0 8px"><h2 style="margin:0">${s.label}
        <span class="tag">${dispo}</span></h2>
        <span class="chip">${s.engine}</span><span class="muted">${s.count} calls analysed</span></div>
      <pre>${(s.output||'').replace(/</g,'&lt;')}</pre></div>`;
  }
  $('#scripts').innerHTML=html;
}

// ---- Script Generator ------------------------------------------------------
// Script types — each button generates a full bot script for that flow/goal
const SCRIPT_TYPES = [
  { key:'profile',   label:'Medicare Profile Update',
    focus:'Medicare Part A & B profile hasn\'t been transferred to the national database for 2026 — get it updated to avoid coverage delays' },
  { key:'benefits',  label:'Grocery & Cash Benefits',
    focus:'Pending grocery and cash benefits available on Medicare account — confirm Part A & B to check eligibility' },
  { key:'partab',    label:'Part A & B Confirm',
    focus:'Quick confirmation that member has both Medicare Part A and Part B to make sure they\'re not missing out on 2026 plan benefits' },
  { key:'drugcap',   label:'$2,100 Drug Cap',
    focus:'2026 Part D out-of-pocket cap of $2,100 — members with Part A & B can stop paying for prescriptions after hitting the cap' },
  { key:'enrollment',label:'Plan Enrollment Review',
    focus:'Annual Enrollment Period Oct 15–Dec 7 — review current Medicare Advantage plan and check for better 2026 options for Part A & B holders' },
  { key:'requalify', label:'Re-Qualify Lost Calls',
    focus:'Re-engage customers who hung up or said not interested — softer approach to confirm Part A & B and offer specialist' },
];

async function renderGenerator(){
  const d = await api('/api/generated');
  const typeBtns = SCRIPT_TYPES.map(t =>
    `<button onclick="genScript('${t.key}','${t.focus.replace(/'/g,"\\'")}')"
      style="background:var(--panel2);border:1px solid var(--line);color:var(--text);
             padding:10px 18px;border-radius:10px;cursor:pointer;font-size:13px;
             text-align:left;line-height:1.4">
      <div style="font-weight:600;color:var(--accent)">${t.label}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${t.focus.slice(0,70)}…</div>
    </button>`
  ).join('');

  $('#generator').innerHTML=`
    <div class="card" style="margin-bottom:18px">
      <h2 style="margin-top:0">Script Generator</h2>
      <p class="muted" style="margin:0 0 16px">
        Pick a script type below. The AI reads your actual call flows and writes
        a complete new bot script with opening, pitch, Part A &amp; B qualify, objection
        handling, and transfer — ready to add to your bot.
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px">
        ${typeBtns}
      </div>
      <div id="gen-status" style="margin-top:14px;padding:10px;border-radius:8px;display:none"></div>
    </div>
    <div id="gen-output"></div>
    <div id="gen-history-wrap">
      <h2>Previously generated scripts</h2>
      <div id="gen-history"></div>
    </div>`;
  renderHistory(d.items);
}

async function genScript(key, focus){
  const statusEl = $('#gen-status');
  statusEl.style.display='block';
  statusEl.style.background='var(--panel2)';
  statusEl.style.color='var(--muted)';
  statusEl.style.border='1px solid var(--line)';
  statusEl.textContent='Writing script… the local AI is working on it (~15–30 seconds)';
  document.querySelectorAll('#generator button').forEach(b=>b.style.opacity='0.5');
  try{
    const rec = await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({style:'direct', focus})
    }).then(r=>r.json());
    $('#gen-output').innerHTML = genCard(rec, true);
    statusEl.style.color='var(--good)';
    statusEl.style.border='1px solid var(--good)';
    statusEl.textContent='Done — script generated and saved below.';
    const d2 = await api('/api/generated');
    renderHistory(d2.items);
  } catch(e){
    statusEl.style.color='var(--bad)';
    statusEl.textContent='Error: '+e;
  }
  document.querySelectorAll('#generator button').forEach(b=>b.style.opacity='1');
}

function genCard(rec, fresh){
  const label = SCRIPT_TYPES.find(t=>t.key===rec.style||t.focus===rec.focus)?.label || rec.focus;
  return `<div class="card" style="margin-bottom:14px;${fresh?'border:1px solid var(--good)':''}">
    <div class="row" style="margin:0 0 10px;justify-content:space-between">
      <div>
        <h2 style="margin:0">${fresh?'New — ':''} ${label||rec.style}</h2>
        <div class="muted" style="font-size:12px;margin-top:3px">${rec.generated_at} · ${rec.engine}</div>
      </div>
      <button onclick="copyScript(this)" data-text="${encodeURIComponent(rec.output||'')}"
        style="background:var(--panel2);border:1px solid var(--line);color:var(--text);
               padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px">
        Copy script
      </button>
    </div>
    <pre>${(rec.output||'').replace(/</g,'&lt;')}</pre>
  </div>`;
}

function copyScript(btn){
  const text = decodeURIComponent(btn.dataset.text);
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy script', 2000);
  });
}

function renderHistory(items){
  if(!items||!items.length){
    $('#gen-history').innerHTML='<div class="card muted">No scripts generated yet — pick a type above.</div>';
    return;
  }
  $('#gen-history').innerHTML = items.map(r=>genCard(r,false)).join('');
}

// ---- Sheet Sync ------------------------------------------------------------
let _syncPoll = null;

async function startSync(){
  const btn = $('#sync-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Syncing…';
  const r = await fetch('/api/sync', {method:'POST'}).then(x=>x.json());
  if(!r.ok){ alert(r.message); btn.disabled=false; btn.textContent='🔄 Sync Sheet'; return; }
  $('#sync-panel').style.display = 'block';
  $('#sync-title').textContent = 'Syncing from Google Sheet…';
  $('#sync-log').innerHTML = '';
  if(_syncPoll) clearInterval(_syncPoll);
  _syncPoll = setInterval(pollSync, 1500);
}

async function pollSync(){
  const s = await api('/api/sync_status');
  const logEl = $('#sync-log');
  logEl.innerHTML = (s.log||[]).map(l=>`<div>${l}</div>`).join('');
  logEl.scrollTop = logEl.scrollHeight;
  if(s.status === 'done' || s.status === 'error'){
    clearInterval(_syncPoll); _syncPoll = null;
    const btn = $('#sync-btn');
    btn.disabled = false;
    btn.textContent = '🔄 Sync Sheet';
    $('#sync-title').textContent = s.status === 'done'
      ? '✅ Sync complete — reloading data…'
      : '❌ Sync error — see log above';
    if(s.status === 'done'){
      // reload summary + flows without full page refresh
      setTimeout(async ()=>{
        SUMMARY = await api('/api/summary');
        FLOWS   = await api('/api/flows');
        $('#hdr-stat').textContent =
          `${SUMMARY.total_calls||0} calls · ${SUMMARY.transfers||0} transfers · ${pct(SUMMARY.transfer_rate)} transfer rate`;
        renderDashboard();
        $('#sync-title').textContent = '✅ Sync complete';
      }, 800);
    }
  }
}

boot();
</script>
